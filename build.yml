name: Build WarfareCore

# Runs on every push, and can be triggered manually from the Actions tab.
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Make the Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build the plugin
        run: ./gradlew build

      # Uploads the finished jar so you can download it from the run page.
      - name: Upload the plugin jar
        uses: actions/upload-artifact@v4
        with:
          name: WarfareCore-plugin
          path: build/libs/WarfareCore-*.jar
